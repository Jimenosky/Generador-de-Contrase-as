<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="description" content="Generador de contraseñas seguras con opciones de longitud, números y caracteres especiales. Powered by API Ninjas." />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔐</text></svg>" />
    <title>Generador de Contraseñas Seguras</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="password-generator">
      <section class="hero">
        <h1>Generador de Contraseñas Seguras</h1>
        <p>Elige tus opciones y crea una contraseña fuerte en segundos.</p>
      </section>

      <form class="generator-form" action="#" novalidate>
        <div class="form-group">
          <label for="length">Longitud de la contraseña</label>
          <input
            id="length"
            name="length"
            type="number"
            min="4"
            max="32"
            value="16"
            required
          />
        </div>

        <div class="form-group checkbox-group">
          <label>
            <input id="include-numbers" name="includeNumbers" type="checkbox" checked />
            Incluir números
          </label>
        </div>

        <div class="form-group checkbox-group">
          <label>
            <input id="include-symbols" name="includeSymbols" type="checkbox" checked />
            Incluir caracteres especiales
          </label>
        </div>

        <button class="generate-button" id="generate-button" type="button" aria-label="Generar contraseña segura">Generar Contraseña</button>
      </form>

      <div class="output-panel">
        <label for="password-output">Contraseña generada</label>
        <div class="output-row">
                    <input id="password-output" class="password-output" type="text" readonly aria-readonly="true" placeholder="Aquí aparecerá la contraseña" />
          <button class="copy-button" id="copy-button" type="button" aria-label="Copiar contraseña al portapapeles" disabled>Copiar</button>
        </div>
        <p id="status-message" class="status-message" aria-live="polite"></p>
      </div>
    </main>

    <script src="app.js"></script>
  </body>
</html>
